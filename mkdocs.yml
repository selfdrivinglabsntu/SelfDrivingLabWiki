site_name: "Codebase Guide"
site_description: "Internal developer documentation and architecture guide"

theme:
  name: material
  palette:
    # This sets up a toggle for light and dark mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs      # Top navigation bar
    - navigation.indexes   # Allows folders to have their own landing pages
    - search.suggest       # Smart search bar dropdowns

# This defines the sidebar structure of your wiki
nav:
  - Home: index.md
  - Architecture: architecture.md
  - Getting Started: setup.md
